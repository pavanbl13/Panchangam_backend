spring:
  application:
    name: sankalpam-api

server:
  port: 8000
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never
  max-http-request-header-size: 8KB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: Sankalpam API
    version: 2.0.0

app:
  cors:
    allowed-origins:
      - "*"
    allowed-methods:
      - GET
      - POST
      - OPTIONS
    allowed-headers:
      - Authorization
      - Content-Type
      - Accept
      - X-Requested-With
      - X-Request-ID
    exposed-headers:
      - X-Request-ID
    allow-credentials: false
    max-age: 3600

logging:
  level:
    com.sankalpam: INFO
    org.springframework.security: WARN
    org.springframework.web: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application-runtime.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7

geosearch:
  api:
    key: ${GEOSEARCH_API_KEY:}
